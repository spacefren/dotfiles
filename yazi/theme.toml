# : Manager [[[

[manager]
cwd = { fg = "#e1e2e8" }

# Tab
tab_active = { fg = "#003259", bg = "#a1c9fd", bold = true }
tab_inactive = { fg = "#d2e4ff", bg = "#001c37" }
tab_width = 1

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#d274ff", bg = "#d274ff" }
marker_cut = { fg = "#f3daff", bg = "#f3daff" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#d7bde4", bg = "#d7bde4" }

# Count
count_copied = { fg = "#251431", bg = "#f3daff" }
count_cut = { fg = "#251431", bg = "#f3daff" }
count_selected = { fg = "#003259", bg = "#d7bde4" }

# Border
border_symbol = "│"
border_style  = { fg = "#a1c9fd" }

# : ]]]


# : Status [[[

[status]
separator_open = "🭁"
separator_close = "🭠"
separator_style = { bg = "#003259", fg = "#F4A261" }

[mode]
# Mode
normal_main = { bg = "#a1c9fd", fg = "#003259", bold = true }
normal_alt  = { bg = "#43474e", fg = "#c3c6cf" }

# Select mode
select_main = { bg = "#bbc7db", fg = "#253141", bold = true }
select_alt  = { bg = "#43474e", fg = "#c3c6cf" }

# Unset mode
unset_main = { bg = "#d7bde4", fg = "#3b2947", bold = true }
unset_alt  = { bg = "#43474e", fg = "#c3c6cf" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#a1c9fd", bg = "#36393e" }
progress_error = { fg = "#ffb4ab", bg = "#36393e" }

# Permissions
permissions_t = { fg = "#5875a5" }
permissions_w = { fg = "#9550b8" }
permissions_x = { fg = "#ff2b12" }
permissions_r = { fg = "#c141ff" }
permissions_s = { fg = "#3988ff" }

# : ]]]


# : Select [[[

[select]
border = { fg = "#a1c9fd" }
active = { fg = "#d7bde4", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#a1c9fd" }
value = { fg = "#e1e2e8" }

# : ]]]


# : Completion [[[

[completion]
border = { fg = "#a1c9fd", bg = "#003259" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#a1c9fd" }
title = {}
hovered = { fg = "#f3daff", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#36393e" }
cand = { fg = "#a1c9fd" }
rest = { fg = "#003259" }
desc = { fg = "#e1e2e8" }
separator = " ▶ "
separator_style = { fg = "#e1e2e8" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#e1e2e8" }
run = { fg = "#e1e2e8" }
footer = { fg = "#253141", bg = "#bbc7db" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#d7bde4" }
title_warn = { fg = "#a1c9fd" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { name = "*", fg = "#e1e2e8" },
    { name = "*/", fg = "#a1c9fd" },
]

[icon]
dirs = [
    { name = "Code", text = "", fg = "#bbc7db" },
    { name = "Documents", text = "", fg = "#bbc7db" },
    { name = "Downloads", text = "", fg = "#bbc7db" },
    { name = "Music", text = "", fg = "#bbc7db" },
    { name = "Pictures", text = "", fg = "#bbc7db" },
    { name = "Videos", text = "", fg = "#bbc7db" },
    { name = "Sync", text = "", fg = "#bbc7db" },
]

conds = [
	{ if = "dir", text = "", fg = "#bbc7db"  },
# 	{ if = "!(dir | link)", text = "", fg = "#a1c9fd" },
# 	{ if = "hidden & dir", text = "", fg = "#d7bde4"  },
]

# : ]]]
